<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minigame Pixelado - Isadora ❤️</title>
    <style>
        /* ... seus estilos existentes ... */
        
        /* ========================================
           TOUCH CONTROLS - CORRIGIDO
           ======================================== */
        #touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            height: 140px;
            pointer-events: none; /* Permite toques nos filhos */
            z-index: 100; /* Reduzido para não bloquear ocanvas */
        }
        
        /* Joystick Analógico */
        #joystick-zone {
            position: absolute;
            left: 20px;
            bottom: 10px;
            width: 110px;
            height: 110px;
            pointer-events: auto;
        }
        
        #joystick-base {
            position: absolute;
            width: 110px;
            height: 110px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            top: 0;
            left: 0;
        }
        
        #joystick-stick {
            position: absolute;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.8);
            border: 2px solid rgba(255,255,255,1);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.03s ease-out;
        }
        
        /* Botão de Interação */
        #interact-btn {
            position: absolute;
            right: 20px;
            bottom: 10px;
            width: 70px;
            height: 70px;
            pointer-events: auto;
            border-radius: 50%;
            background: rgba(255,105,180,0.3);
            border: 2px solid rgba(255,105,180,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        
        #interact-btn::after {
            content: 'E';
            font-size: 24px;
            font-weight: bold;
            color: rgba(255,255,255,0.8);
            font-family: 'Courier New', monospace;
        }
        
        #interact-btn:active, #interact-btn.pressed {
            background: rgba(255,105,180,0.6);
            transform: scale(0.95);
        }
        
        /* Rótulos */
        .touch-label {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }
        
        /* Mostrar controles apenas em telas menores OU dispositivos touch */
        @media (max-width: 768px), (hover: none) {
            #touch-controls {
                display: block;
            }
        }
        
        /* ========================================
           CORREÇÃO: GARANTIR QUE O CANVAS FIQUE VISÍVEL
           ======================================== */
        #game-canvas {
            z-index: 10 !important;
            position: relative !important;
        }
        
        /* Se for dispositivo touch, garantir que canvas fique acima */
        .touch-detected #game-canvas {
            z-index: 10 !important;
        }
        
        .touch-detected #touch-controls {
            z-index: 50; /* Acima do canvas, mas não alto demais */
        }
    </style>
</head>
<body>
    <!-- Canvas do jogo -->
    <canvas id="game-canvas"></canvas>
    
    <!-- Controles Touch -->
    <div id="touch-controls">
        <div id="joystick-zone">
            <div id="joystick-base"></div>
            <div id="joystick-stick"></div>
            <span class="touch-label">MOV</span>
        </div>
        
        <div id="interact-btn"></div>
    </div>

    <script>
        // ========================================
        // SEU CÓDIGO DO JOGO (RESUMIDO)
        // ========================================
        
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // Configurar tamanho do canvas
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Variáveis do jogo
        const keys = {};
        let showingDialog = false;
        let gameWon = false;
        
        // Jogador
        const player = {
            x: 100,
            y: 100,
            size: 32,
            speed: 4,
            color: '#ff69b4'
        };
        
        // Mapa (exemplo)
        const tileSize = 32;
        const mapWidth = Math.ceil(canvas.width / tileSize);
        const mapHeight = Math.ceil(canvas.height / tileSize);
        const map = [];
        
        for (let y = 0; y < mapHeight; y++) {
            map[y] = [];
            for (let x = 0; x < mapWidth; x++) {
                // Gerar chão aleatório
                map[y][x] = Math.random() > 0.3 ? 0 : 1;
            }
        }
        
        // Elementos interagíveis
        const interactables = [
            { x: 200, y: 150, color: '#ffd700', name: 'Moeda', colorName: '#ffec8b' },
            { x: 350, y: 200, color: '#00ff00', name: 'Planta', colorName: '#90ee90' },
            { x: 450, y: 100, color: '#00ffff', name: 'Água', colorName: '#87ceeb' },
            { x: 300, y: 350, color: '#ff4500', name: 'Fogo', colorName: '#ffb6c1' }
        ];
        
        // ========================================
        // DETECTAR DISPOSITIVO TOUCH – VERSÃO CORRIGIDA
        // ========================================
        
        const isTouch = ('ontouchstart' in window) || 
                      (navigator.maxTouchPoints > 0) || 
                      (navigator.msMaxTouchPoints > 0);
        
        if (isTouch) {
            document.body.classList.add('touch-detected');
            console.log('Touch detectado!');
        }
        
        // Prevenir scroll e zoom em dispositivos touch
        if (isTouch) {
            document.addEventListener('touchmove', (e) => {
                // Só previne se não estiver nos controles touch
                if (!e.target.closest('#touch-controls')) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            document.addEventListener('gesturestart', e => e.preventDefault());
            document.addEventListener('gesturechange', e => e.preventDefault());
        }
        
        // ========================================
        // SISTEMA DE TOUCH CONTROLS – CORRIGIDO
        // ========================================
        
        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystick-stick');
        const interactBtn = document.getElementById('interact-btn');
        
        let joystickActive = false;
        let joystickTouchId = null;
        let joystickOrigin = { x: 0, y: 0 };
        let moveInput = { x: 0, y: 0 };
        const maxRadius = 30;
        
        // Joystick – Início do toque
        joystickZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            const touch = e.touches[0];
            joystickTouchId = touch.identifier;
            joystickActive = true;
            
            // Center do joystick
            const rect = joystickZone.getBoundingClientRect();
            joystickOrigin = {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
        }, { passive: false });
        
        // Joystick – Movimento do toque
        joystickZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            if (!joystickActive) return;
            
            // Encontrar o toque correto
            let touch = null;
            for (let i = 0; i < e.touches.length; i++) {
                if (e.touches[i].identifier === joystickTouchId) {
                    touch = e.touches[i];
                    break;
                }
            }
            if (!touch) return;
            
            // Calcular deslocamento
            let dx = touch.clientX - joystickOrigin.x;
            let dy = touch.clientY - joystickOrigin.y;
            
            // Limitar ao raio máximo
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > maxRadius) {
                dx = (dx / dist) * maxRadius;
                dy = (dy / dist) * maxRadius;
            }
            
            // Mover visualmente o stick
            joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            // Calcular input (-1 a 1)
            moveInput.x = dx / maxRadius;
            moveInput.y = dy / maxRadius;
            
        }, { passive: false });
        
        // Joystick – Fim do toque
        const resetJoystick = () => {
            joystickActive = false;
            joystickTouchId = null;
            moveInput.x = 0;
            moveInput.y = 0;
            joystickStick.style.transform = 'translate(-50%, -50%)';
        };
        
        joystickZone.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joystickTouchId) {
                    resetJoystick();
                    break;
                }
            }
        }, { passive: false });
        
        joystickZone.addEventListener('touchcancel', resetJoystick, { passive: false });
        
        // Botão de Interação
        interactBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            interactBtn.classList.add('pressed');
            
            // Ação
            if (!showingDialog && !gameWon) {
                checkInteraction();
            } else if (gameWon) {
                location.reload();
            }
        }, { passive: false });
        
        interactBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            interactBtn.classList.remove('pressed');
        }, { passive: false });
        
        // ========================================
        // CONTROLES DE TECLADO (manter)
        // ========================================
        
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            if (e.key.toLowerCase() === 'e' && !showingDialog && !gameWon) {
                checkInteraction();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        // ========================================
        // VERIFICAR INTERAÇÃO
        // ========================================
        
        function checkInteraction() {
            const interactionRange = 50;
            
            for (let obj of interactables) {
                const dist = Math.sqrt(
                    Math.pow(player.x - obj.x, 2) + 
                    Math.pow(player.y - obj.y, 2)
                );
                
                if (dist < interactionRange + player.size) {
                    showDialog(`Você encontrou: ${obj.name}! ❤️`);
                    return;
                }
            }
        }
        
        function showDialog(text) {
            showingDialog = true;
            // Aqui você mostraria o diálogo (adaptar ao seu código)
            console.log(text);
            
            // Fechar após 2 segundos (exemplo)
            setTimeout(() => {
                showingDialog = false;
            }, 2000);
        }
        
        // ========================================
        // LOOP PRINCIPAL DO JOGO (CORRIGIDO)
        // ========================================
        
        function update() {
            // Teclado
            if (keys['w'] && player.y > 0) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - player.size) player.y += player.speed;
            if (keys['a'] && player.x > 0) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - player.size) player.x += player.speed;
            
            // Joystick (apenas se ativo)
            if (joystickActive) {
                const threshold = 0.2;
                const speed = player.speed;
                
                if (moveInput.y < -threshold && player.y > 0) {
                    player.y += moveInput.y * speed;
                }
                if (moveInput.y > threshold && player.y < canvas.height - player.size) {
                    player.y += moveInput.y * speed;
                }
                if (moveInput.x < -threshold && player.x > 0) {
                    player.x += moveInput.x * speed;
                }
                if (moveInput.x > threshold && player.x < canvas.width - player.size) {
                    player.x += moveInput.x * speed;
                }
            }
        }
        
        function draw() {
            // Limpar canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Desenhar mapa (chão)
            for (let y = 0; y < mapHeight; y++) {
                for (let x = 0; x < mapWidth; x++) {
                    const tileX = x * tileSize;
                    const tileY = y * tileSize;
                    
                    if (map[y][x] === 0) {
                        // Chão normal
                        ctx.fillStyle = '#2d2d44';
                        ctx.fillRect(tileX, tileY, tileSize, tileSize);
                        ctx.strokeStyle = '#3d3d54';
                        ctx.strokeRect(tileX, tileY, tileSize, tileSize);
                    } else {
                        // Chão مختلف
                        ctx.fillStyle = '#3d3d54';
                        ctx.fillRect(tileX, tileY, tileSize, tileSize);
                    }
                }
            }
            
            // Desenhar elementos interagíveis
            for (let obj of interactables) {
                ctx.fillStyle = obj.color;
                ctx.fillRect(obj.x, obj.y, player.size, player.size);
                
                ctx.fillStyle = obj.colorName;
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(obj.name, obj.x + player.size/2, obj.y - 5);
            }
            
            // Desenhar jogador
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            
            // Borda do jogador
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x, player.y, player.size, player.size);
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // Iniciar
        gameLoop();
    </script>
</body>
</html>
