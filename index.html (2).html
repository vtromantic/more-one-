<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minigame Pixelado - Isadora ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #111, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: white;
        }
        
        #game {
            border: 3px solid #fff;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            box-shadow: 0 0 20px rgba(2, 2, 2, 0.133);
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border: 1px solid #ffffff;
            border-radius: 5px;
        }
        
        .dialog {
            position: fixed;
            background: linear-gradient(145deg, #020202, #020202);
            border: 2px solid #fff;
            padding: 20px;
            max-width: 320px;
            min-height: 120px;
            display: none;
            font-size: 13px;
            line-height: 1.4;
            box-shadow: 0 0 30px rgba(243, 242, 242, 0.3);
            z-index: 1000;
        }
        
        .dialog.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .dialog-title {
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 5px #bc69ff;
        }
        
        .dialog-text {
            margin-bottom: 20px;
            white-space: pre-wrap;
            color: #ddd;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            background: linear-gradient(145deg, #444, #555);
            border: 2px solid #666;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            border-radius: 8px;
            user-select: none;
        }
        
        .option:hover {
            background: linear-gradient(145deg, #555, #666);
            border-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }
        
        .option.correct {
            background: linear-gradient(145deg, #0f0, #2f2) !important;
            border-color: #0f0 !important;
            color: #000 !important;
            animation: pulse 0.6s;
            transform: scale(1.05);
        }
        
        .option.wrong {
            background: linear-gradient(145deg, #f00, #f44) !important;
            border-color: #f00 !important;
            color: #fff !important;
            animation: shake 0.4s;
        }
        
        .heart {
            position: fixed;
            font-size: 28px;
            color: #ff69b4;
            animation: heartFloat 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 1001;
            text-shadow: 0 0 10px #ff69b4;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        
        @keyframes heartFloat {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.3); opacity: 0; }
        }

        .victory {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, rgb(8, 8, 8), rgb(31, 2, 56));
            border: 3px solid #fff;
            padding: 30px;
            text-align: center;
            font-size: 18px;
            display: none;
            z-index: 2000;
            border-radius: 15px;
            animation: victoryPulse 2s infinite;
        }

        .victory.active {
            display: block;
        }

        @keyframes victoryPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>
    <div id="ui">
        WASD: Mover | E: Interagir<br>
        <span id="progress">Pergunta 1/3</span>
    </div>
    
    <canvas id="game" width="400" height="300"></canvas>
    
    <div id="dialog" class="dialog">
        <div class="dialog-title">💕 Isadora 💕</div>
        <div id="dialog-text" class="dialog-text"></div>
        <div id="options" class="options"></div>
    </div>

    <div id="victory" class="victory">
        <div style="font-size: 24px; margin-bottom: 15px;">UUUUUHUUUULLLLL</div>
        <div style="font-size: 16px; color: #ffffff;">EU TE CONHEÇO BEM!</div>
        <div style="margin-top: 20px; font-size: 14px;">EU TE AMO MINHA PRINCESA!!!</div>
    </div>

    <script>
        // === CONFIGURAÇÕES DO JOGO ===
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        // === PERSONAGEM JOGADOR ===
        const player = {
            x: 50,
            y: 50,
            size: 10,
            speed: 2.5
        };

        // === PERSONAGEM ISADORA ===
        const isadora = {
            x: 200,
            y: 120,
            size: 10,
            nickname: 'Isadora',
            color: '#ff69b4',
            angry: false,
            interactionRange: 25
        };

        // === SISTEMA DE DIÁLOGO - CORRIGIDO ===
        const dialogs = [
            {
                question: "Qual minhas cores favoritas?",
                options: ['preto e roxo', 'verde e amarelo', 'azul e laranja'],
                correct: 0  // Índice da opção correta
            },
            {
                question: "Qual minha flor favorita?",
                options: ['margarida', 'rosa', 'Lírios'],
                correct: 2  // Índice da opção correta
            },
            {
                question: "Qual meu filme fav?",
                options: ['Demon Slayer: Castelo Infinito', 'Interestelar', 'Será DG Circus'],
                correct: 2  // Índice da opção correta
            }
        ];

        let currentDialog = 0;
        let showingDialog = false;
        let gameWon = false;

        // === CONTROLES ===
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            
            if (e.key.toLowerCase() === 'e' && !showingDialog && !gameWon) {
                checkInteraction();
            }
            
            if (e.key.toLowerCase() === 'e' && gameWon) {
                location.reload();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // === FUNÇÃO PRINCIPAL DO LOOP ===
        function gameLoop() {
            if (!gameWon) {
                update();
                render();
            }
            requestAnimationFrame(gameLoop);
        }

        // === UPDATE ===
        function update() {
            // Movimento do jogador
            if (keys['w'] && player.y > 0) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - player.size) player.y += player.speed;
            if (keys['a'] && player.x > 0) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - player.size) player.x += player.speed;
        }

        // === RENDER ===
        function render() {
            // Fundo gradiente
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#001122');
            gradient.addColorStop(1, '#000011');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grade pixelada
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 12) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 12) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Jogador (pixelado com detalhes)
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x+2, player.y+2, player.size-4, player.size-4);
            ctx.fillStyle = '#aaa';
            ctx.fillRect(player.x+1, player.y+1, 2, 2); // olho

            // Isadora (pixelada fofa)
            ctx.fillStyle = isadora.angry ? '#ff4444' : isadora.color;
            ctx.fillRect(isadora.x+1, isadora.y, isadora.size-2, isadora.size);
            ctx.fillStyle = '#fff';
            ctx.fillRect(isadora.x+3, isadora.y+2, 2, 2); // olho
            ctx.fillRect(isadora.x+5, isadora.y+2, 2, 2); // olho

            // Nickname da Isadora
            ctx.fillStyle = '#fff';
            ctx.font = '9px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText(isadora.nickname, isadora.x + isadora.size/2, isadora.y - 8);
            ctx.font = '7px Courier New';
            ctx.fillStyle = '#ff69b4';
            ctx.fillText('💕', isadora.x + isadora.size/2, isadora.y - 18);

            // Círculo de interação
            const dist = Math.sqrt(
                Math.pow(player.x + player.size/2 - (isadora.x + isadora.size/2), 2) + 
                Math.pow(player.y + player.size/2 - (isadora.y + isadora.size/2), 2)
            );
            
            if (dist < isadora.interactionRange && !showingDialog) {
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(isadora.x + isadora.size/2, isadora.y + isadora.size/2, isadora.interactionRange, 0, Math.PI * 2);
                ctx.stroke();
                ctx.lineWidth = 1;
            }

            // Progresso
            document.getElementById('progress').textContent = `Pergunta ${currentDialog + 1}/${dialogs.length}`;
        }

        // === INTERAÇÃO ===
        function checkInteraction() {
            const dist = Math.sqrt(
                Math.pow(player.x + player.size/2 - (isadora.x + isadora.size/2), 2) + 
                Math.pow(player.y + player.size/2 - (isadora.y + isadora.size/2), 2)
            );
            
            if (dist < isadora.interactionRange && !showingDialog) {
                showDialog(currentDialog);
            }
        }

        // ========================================
        // CÓDIGO DO BALÃO DE FALA - CORRIGIDO
        // ========================================
        
        const dialogEl = document.getElementById('dialog');
        const dialogTextEl = document.getElementById('dialog-text');
        const optionsEl = document.getElementById('options');
        const victoryEl = document.getElementById('victory');

        function showDialog(index) {
            if (index >= dialogs.length || gameWon) {
                return;
            }
            
            showingDialog = true;
            const dialog = dialogs[index];
            
            dialogTextEl.textContent = dialog.question;
            optionsEl.innerHTML = '';
            
            dialog.options.forEach((option, i) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => selectOption(i, dialog.correct);
                optionsEl.appendChild(btn);
            });
            
            // Posicionar balão inteligentemente
            const dialogRect = dialogEl.getBoundingClientRect();
            let left = isadora.x + 30;
            let top = isadora.y - 150;
            
            if (left + dialogRect.width > window.innerWidth) {
                left = isadora.x - dialogRect.width - 20;
            }
            if (top < 0) {
                top = isadora.y + 30;
            }
            
            dialogEl.style.left = left + 'px';
            dialogEl.style.top = top + 'px';
            dialogEl.classList.add('active');
        }

        function hideDialog() {
            showingDialog = false;
            dialogEl.classList.remove('active');
            isadora.angry = false;
            currentDialog++;
            
            if (currentDialog >= dialogs.length) {
                setTimeout(() => {
                    gameWon = true;
                    victoryEl.classList.add('active');
                }, 500);
            }
        }

        function selectOption(selectedIndex, correctIndex) {
            const options = Array.from(optionsEl.children);
            
            // Desabilitar todos os botões
            options.forEach(opt => opt.style.pointerEvents = 'none');
            
            // Feedback visual
            if (selectedIndex === correctIndex) {
                options[selectedIndex].classList.add('correct');
                showHeart();
                setTimeout(hideDialog, 1500);
            } else {
                options[selectedIndex].classList.add('wrong');
                options[correctIndex].classList.add('correct');
                isadora.angry = true;
                setTimeout(() => {
                    options[selectedIndex].classList.remove('wrong');
                    isadora.angry = false;
                }, 1000);
            }
        }

        function showHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '💖';
            heart.className = 'heart';
            heart.style.left = (isadora.x + 35) + 'px';
            heart.style.top = (isadora.y - 10) + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                if (heart.parentNode) {
                    document.body.removeChild(heart);
                }
            }, 1200);
        }

        // === INICIAR JOGO ===
        gameLoop();
    </script>
</body>
</html>
